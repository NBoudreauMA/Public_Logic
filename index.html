    .menu{position:relative}
    .menu-btn{background:transparent;color:#e9f9f0;border:1px solid var(--border);border-radius:999px;padding:.6rem 1rem;font-weight:800;cursor:pointer}

    .menu[aria-expanded="true"] .menu-list{opacity:1;visibility:visible;transform:translateY(0)}
    .menu a{display:block;padding:.65rem .75rem;border-radius:8px;color:#e8f3ee;text-decoration:none;font-weight:700}
    .menu .sep{height:1px;background:rgba(255,255,255,.12);margin:.35rem .25rem}

    /* Hero */
    .hero{padding:3.6rem 1rem 2.4rem;text-align:center}
    .folder-hero{display:inline-block;position:relative;width:420px;height:280px;margin-bottom:24px}
    .folder-shape{width:100%;height:100%;background:var(--manila);border-radius:12px;box-shadow:0 14px 32px rgba(0,0,0,.42)}
    .folder-shape::before{content:"";position:absolute;top:-28px;left:0;width:160px;height:28px;background:var(--manila);border-radius:12px 12px 0 0}
    /* Paper texture overlay */
    .folder-shape::after{
      content:"";position:absolute;inset:0;pointer-events:none;opacity:.12;
      background:repeating-linear-gradient(90deg,rgba(0,0,0,.06) 0px,rgba(0,0,0,.06) 1px,transparent 2px,transparent 5px),
                 radial-gradient(1000px 600px at 30% 20%, rgba(0,0,0,.03), transparent 60%),
                 radial-gradient(800px 500px at 70% 80%, rgba(255,255,255,.03), transparent 60%);
      mix-blend-mode:multiply;border-radius:12px;
    }
    /* Logo printed effect */
    .folder-logo{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);width:78%;height:auto;display:block;

    .hero-title{font-size:clamp(1.6rem,6.2vw,3rem);font-weight:900;margin:.3rem 0 .9rem;background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

    .card{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:1rem}
